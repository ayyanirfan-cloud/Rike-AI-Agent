<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Workspace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Decorative background glow */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            top: 20%;
            left: 25%;
        }

        .container {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            padding: 40px 20px;
        }

        .avatar-container {
            margin-bottom: 24px;
            position: relative;
            display: inline-block;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            animation: float 4s ease-in-out infinite;
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 18px;
            height: 18px;
            background-color: #22c55e;
            border: 3px solid #0f172a;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .hint-box {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 24px;
            border-radius: 20px;
            color: #cbd5e1;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
        }

        .hint-icon {
            color: #818cf8;
            animation: pulse 2s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-container">
            <div class="avatar">🤖</div>
            <div class="status-dot"></div>
        </div>
        <h1>AI Assistant Online</h1>
        <p>Welcome! Our intelligent agent is fully trained and ready to handle your tasks, answer questions, or walk you through configurations. Made By Ayyan Irfan</p>
        
        <div class="hint-box">
            <span class="hint-icon">👇</span>
            <span>Click the chat bubble in the bottom right corner to begin</span>
        </div>
    </div>

</html>
